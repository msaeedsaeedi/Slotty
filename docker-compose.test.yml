services:
  postgres_test:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: slotty_test
      POSTGRES_USER: slotty
      POSTGRES_PASSWORD: slotty
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slotty"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis_test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_test_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_test_data:
  redis_test_data:
